spring.application.name=FleetFlow
#spring.datasource.url=jdbc:mysql://mysql-container:3306/fleetflow?createDatabaseIfNotExist=true
spring.datasource.url=jdbc:mysql://localhost:3360/fleetflow?createDatabaseIfNotExist=true
spring.datasource.username=root

spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.enabled=true

spring.flyway.baseline-on-migrate=true

spring.flyway.locations=classpath:db/migration

spring.flyway.clean-disabled=true
